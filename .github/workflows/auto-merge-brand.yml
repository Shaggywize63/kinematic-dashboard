name: Auto-merge brand identity to main

on:
  push:
    branches:
      - claude/apply-brand-identity-W08qR

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge brand branch into main
        run: |
          git fetch origin main claude/apply-brand-identity-W08qR
          git checkout main
          git merge --no-ff origin/claude/apply-brand-identity-W08qR \
            -m "chore: auto-merge brand identity [skip ci]"
          git push origin main
