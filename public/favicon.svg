<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <style>
    .k-dark { display: none; }
    @media (prefers-color-scheme: dark) {
      .k-light { display: none; }
      .k-dark { display: inline; }
    }
  </style>
  <image class="k-light" width="64" height="64" href="data:image/png;base64,"/>
  <image class="k-dark"  width="64" height="64" href="data:image/png;base64,"/>
</svg>
